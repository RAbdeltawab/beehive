<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hive Monitor Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #FFFFFF;
      --surface: #F8F8F6;
      --border: #000000;
      --text: #000000;
      --radius: 8px;
    }

    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; padding: 10px; }
    .page { max-width: 800px; margin: 0 auto; }
    .header { padding: 10px 0; border-bottom: 2px solid var(--text); margin-bottom: 15px; }

    /* Result Banner */
    .result-banner {
      display: none; align-items: center; gap: 12px; padding: 15px;
      border-radius: var(--radius); margin-bottom: 15px; border: 2px solid var(--text);
    }
    .result-banner.pass { background: #EAF3DE; border-color: #3B6D11; }
    .result-banner.fail { background: #FCEBEB; border-color: #A32D2D; }
    .result-banner.offline { background: #FAEEDA; border-color: #BA7517; }
    .result-icon { font-size: 24px; font-weight: 700; }

    /* Metrics */
    .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
    .metric-card { background: var(--bg); border: 2px solid var(--text); border-radius: var(--radius); padding: 12px; text-align: center; }
    .m-label { font-size: 11px; font-weight: 700; text-transform: uppercase; }
    .m-value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 700; }
    .badge { font-size: 10px; font-weight: 700; padding: 3px 6px; border: 1px solid var(--text); border-radius: 4px; display: inline-block; margin-top: 5px; }
    .badge.pass { background: #d4edda; }
    .badge.fail { background: #f8d7da; }

    /* Charts */
    .chart-container { border: 2px solid var(--text); border-radius: var(--radius); padding: 15px; margin-bottom: 20px; background: var(--bg); }
    .chart-header { font-weight: 700; margin-bottom: 10px; display: flex; justify-content: space-between; font-size: 14px; }
    .chart-wrap { position: relative; width: 100%; height: 280px; }

    @media (max-width: 600px) { .metrics { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="page">
  <div class="header"><h1 style="font-size: 22px;">HIVE MONITOR</h1></div>

  <div class="result-banner" id="result-banner">
    <div class="result-icon" id="result-icon"></div>
    <div>
      <div id="result-title" style="font-weight: 700; font-size: 16px;"></div>
      <div id="result-sub" style="font-size: 12px;"></div>
    </div>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="m-label">CO2 (PPM)</div>
      <div class="m-value" id="v-co2">—</div>
      <div id="b-co2" class="badge">WAIT</div>
    </div>
    <div class="metric-card">
      <div class="m-label">TEMP (°F)</div>
      <div class="m-value" id="v-temp">—</div>
      <div id="b-temp" class="badge">WAIT</div>
    </div>
    <div class="metric-card">
      <div class="m-label">HUMIDITY (%)</div>
      <div class="m-value" id="v-hum">—</div>
      <div id="b-hum" class="badge">WAIT</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-header">CO2 HISTORY</div>
    <div class="chart-wrap"><canvas id="c-co2"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header">TEMPERATURE HISTORY</div>
    <div class="chart-wrap"><canvas id="c-temp"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header">HUMIDITY HISTORY</div>
    <div class="chart-wrap"><canvas id="c-hum"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const CHANNEL = '3329131';
  const LIMIT = 720;
  const RANGE = { co2: { min: 400, max: 10000 }, temp: { min: 70, max: 97 }, hum: { min: 50, max: 60 } };

  // Improved Label Visibility
  function fmtLabel(iso) {
    const d = new Date(iso);
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ' ' + 
           d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function makeChart(ctxId, color) {
    return new Chart(document.getElementById(ctxId), {
      type: 'line',
      data: { labels: [], datasets: [{ 
        data: [], borderColor: color, borderWidth: 3, pointRadius: 2, 
        pointHoverRadius: 6, tension: 0.2, fill: false, spanGaps: true 
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { intersect: false, mode: 'index' }, // Makes hover work better
        plugins: { 
          legend: { display: false },
          tooltip: {
            enabled: true,
            backgroundColor: '#000',
            titleFont: { size: 13 },
            bodyFont: { size: 15, weight: 'bold' },
            padding: 12,
            displayColors: false
          }
        },
        scales: {
          x: { 
            ticks: { 
              color: '#000', 
              font: { weight: 'bold', size: 11 }, // Bigger and bolder for outdoor
              maxTicksLimit: 4 
            } 
          },
          y: { 
            grid: { color: '#ddd' }, 
            ticks: { color: '#000', font: { weight: 'bold', size: 11 } } 
          }
        }
      }
    });
  }

  const charts = { co2: makeChart('c-co2', '#855400'), temp: makeChart('c-temp', '#1E4600'), hum: makeChart('c-hum', '#004A85') };

  function setBanner(state, title, sub) {
    const b = document.getElementById('result-banner');
    b.style.display = 'flex';
    b.className = 'result-banner ' + state;
    document.getElementById('result-icon').textContent = state === 'pass' ? '✓' : state === 'fail' ? '✗' : '!';
    document.getElementById('result-title').textContent = title;
    document.getElementById('result-sub').textContent = sub;
  }

  async function sync() {
    try {
      const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL}/feeds.json?results=${LIMIT}`);
      const data = await res.json();
      const feeds = data.feeds;
      if (!feeds.length) return;

      const last = feeds[feeds.length - 1];
      const co2 = parseFloat(last.field1), temp = parseFloat(last.field2), hum = parseFloat(last.field3);
      const timeStr = fmtLabel(last.created_at);

      document.getElementById('v-co2').textContent = Math.round(co2);
      document.getElementById('v-temp').textContent = temp.toFixed(1);
      document.getElementById('v-hum').textContent = hum.toFixed(1);

      const cOk = co2 >= RANGE.co2.min && co2 <= RANGE.co2.max;
      const tOk = temp >= RANGE.temp.min && temp <= RANGE.temp.max;
      const hOk = hum >= RANGE.hum.min && hum <= RANGE.hum.max;

      const updateBadge = (id, ok) => {
        const b = document.getElementById('b-' + id);
        b.textContent = ok ? 'PASS' : 'FAIL';
        b.className = 'badge ' + (ok ? 'pass' : 'fail');
      };
      updateBadge('co2', cOk); updateBadge('temp', tOk); updateBadge('hum', hOk);

      const stale = (Date.now() - new Date(last.created_at).getTime()) > 20 * 60 * 1000;
      if (stale) {
        setBanner('offline', 'OFFLINE', 'Last: ' + timeStr);
      } else if (cOk && tOk && hOk) {
        setBanner('pass', 'ALL SYSTEMS NORMAL', 'Last sync: ' + timeStr);
      } else {
        setBanner('fail', 'CHECK HIVE', 'Out of range detected at ' + timeStr);
      }

      const updateChart = (chart, field) => {
        const values = feeds.map(f => { const v = parseFloat(f[field]); return isNaN(v) ? null : v; });
        chart.data.labels = feeds.map(f => fmtLabel(f.created_at));
        chart.data.datasets[0].data = values;
        
        // Dynamic scaling to prevent "flat" lines
        const valid = values.filter(v => v !== null);
        const min = Math.min(...valid), max = Math.max(...valid);
        const pad = (max - min) * 0.2 || 2;
        chart.options.scales.y.min = Math.floor(min - pad);
        chart.options.scales.y.max = Math.ceil(max + pad);
        
        chart.update('none');
      };
      updateChart(charts.co2, 'field1'); updateChart(charts.temp, 'field2'); updateChart(charts.hum, 'field3');

    } catch (e) { console.error(e); }
  }

  sync();
  setInterval(sync, 300000);
</script>
</body>
</html>
