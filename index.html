<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hive Monitor Outdoor</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@500&family=DM+Sans:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* High Contrast Outdoor Palette */
      --bg:         #FFFFFF;      /* Pure white for maximum outdoor reflection */
      --surface:    #F2F2F0;      /* Light grey for card definition */
      --border:     #000000;      /* Black borders for sharp definition */
      --text:       #000000;      /* Pure black text for readability */
      --text-muted: #333333;
      --amber:      #855400;      /* Darkened for contrast on white */
      --green:      #1E4600;      /* Darkened green */
      --red:        #8C0000;      /* Darkened red */
      --radius:     8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      padding: 10px;
    }

    .page {
      max-width: 800px;
      margin: 0 auto;
    }

    .header {
      padding: 15px 0;
      border-bottom: 2px solid var(--text);
      margin-bottom: 20px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px;
      background: var(--surface);
      border: 2px solid var(--text); /* Bold border for visibility */
      border-radius: var(--radius);
      margin-bottom: 20px;
      font-weight: 700;
    }

    .dot { width: 12px; height: 12px; border-radius: 50%; border: 1px solid #000; }
    .dot.ok { background: #2ecc71; }
    .dot.fail { background: #e74c3c; }
    .dot.loading { background: #f1c40f; animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 25px;
    }

    .metric-card {
      background: var(--bg);
      border: 2px solid var(--text);
      border-radius: var(--radius);
      padding: 15px;
      text-align: center;
    }

    .m-label { font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .m-value { font-family: 'DM Mono', monospace; font-size: 32px; font-weight: 700; margin: 5px 0; }
    
    .badge {
      font-size: 11px;
      font-weight: 700;
      padding: 4px 8px;
      border: 1px solid var(--text);
      border-radius: 4px;
      display: inline-block;
    }
    .badge.pass { background: #d4edda; color: var(--green); }
    .badge.fail { background: #f8d7da; color: var(--red); }

    .chart-container {
      border: 2px solid var(--text);
      border-radius: var(--radius);
      padding: 15px;
      margin-bottom: 20px;
      background: var(--bg);
    }

    .chart-header {
      font-weight: 700;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .chart-wrap { position: relative; width: 100%; height: 260px; }

    @media (max-width: 600px) {
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="header">
    <h1 style="font-size: 24px;">HIVE MONITOR</h1>
  </div>

  <div class="status-bar">
    <div id="status-dot" class="dot loading"></div>
    <span id="status-text">SYNCING...</span>
    <span id="last-check" style="margin-left: auto;">—</span>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="m-label">CO2 (PPM)</div>
      <div class="m-value" id="v-co2">—</div>
      <div id="b-co2" class="badge">WAIT</div>
    </div>
    <div class="metric-card">
      <div class="m-label">TEMP (°F)</div>
      <div class="m-value" id="v-temp">—</div>
      <div id="b-temp" class="badge">WAIT</div>
    </div>
    <div class="metric-card">
      <div class="m-label">HUMIDITY (%)</div>
      <div class="m-value" id="v-hum">—</div>
      <div id="b-hum" class="badge">WAIT</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-header">CO2 HISTORY</div>
    <div class="chart-wrap"><canvas id="c-co2"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header">TEMPERATURE HISTORY</div>
    <div class="chart-wrap"><canvas id="c-temp"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header">HUMIDITY HISTORY</div>
    <div class="chart-wrap"><canvas id="c-hum"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const CHANNEL = '3329131';
  const LIMIT = 720;
  const RANGE = { co2: { min: 400, max: 10000 }, temp: { min: 70, max: 97 }, hum: { min: 50, max: 60 } };

  function makeChart(ctxId, color) {
    return new Chart(document.getElementById(ctxId), {
      type: 'line',
      data: { labels: [], datasets: [{ 
        data: [], 
        borderColor: color, 
        borderWidth: 3,        /* Thicker lines for outdoor viewing */
        pointRadius: 0,
        tension: 0.2,
        fill: false,           /* Removed fill to keep background "clean" */
        spanGaps: false        /* Fixes the "laggy" diagonal lines */
      }]},
      options: {
        responsive: true,
        maintainAspectRatio: false,
        parsing: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { ticks: { color: '#000', font: { weight: 'bold' }, maxTicksLimit: 5 } },
          y: { 
            grid: { color: '#ddd' }, 
            ticks: { color: '#000', font: { weight: 'bold' } } 
          }
        }
      }
    });
  }

  const charts = {
    co2:  makeChart('c-co2', '#855400'),
    temp: makeChart('c-temp', '#1E4600'),
    hum:  makeChart('c-hum', '#004A85')
  };

  async function sync() {
    try {
      const res = await fetch(`https://api.thingspeak.com/channels/${CHANNEL}/feeds.json?results=${LIMIT}`);
      const data = await res.json();
      const feeds = data.feeds;
      if (!feeds.length) return;

      const last = feeds[feeds.length - 1];
      
      // Update UI
      document.getElementById('v-co2').textContent = Math.round(last.field1);
      document.getElementById('v-temp').textContent = parseFloat(last.field2).toFixed(1);
      document.getElementById('v-hum').textContent = parseFloat(last.field3).toFixed(1);

      // Status Badges
      const check = (id, val, r) => {
        const isOk = val >= r.min && val <= r.max;
        const b = document.getElementById('b-' + id);
        b.textContent = isOk ? 'PASS' : 'FAIL';
        b.className = 'badge ' + (isOk ? 'pass' : 'fail');
      };
      check('co2', last.field1, RANGE.co2);
      check('temp', last.field2, RANGE.temp);
      check('hum', last.field3, RANGE.hum);

      // Update Charts
      const update = (chart, field) => {
        const values = feeds.map(f => {
          const v = parseFloat(f[field]);
          return isNaN(v) ? null : v;
        });
        chart.data.labels = feeds.map(f => new Date(f.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
        chart.data.datasets[0].data = values;
        
        // Auto-scale with 20% buffer
        const valid = values.filter(v => v !== null);
        const min = Math.min(...valid), max = Math.max(...valid);
        const pad = (max - min) * 0.2 || 2;
        chart.options.scales.y.min = Math.floor(min - pad);
        chart.options.scales.y.max = Math.ceil(max + pad);
        chart.update('none');
      };

      update(charts.co2, 'field1');
      update(charts.temp, 'field2');
      update(charts.hum, 'field3');

      document.getElementById('status-dot').className = 'dot ok';
      document.getElementById('status-text').textContent = 'ACTIVE';
      document.getElementById('last-check').textContent = new Date().toLocaleTimeString();

    } catch (e) {
      document.getElementById('status-text').textContent = 'OFFLINE';
      document.getElementById('status-dot').className = 'dot fail';
    }
  }

  sync();
  setInterval(sync, 300000);
</script>
</body>
</html>
