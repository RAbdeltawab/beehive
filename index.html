<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hive Monitor Pro</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0f0f0e;
      --surface:    #1a1a18;
      --border:     rgba(255,255,255,0.08);
      --text:       #f1efe8;
      --text-muted: #b4b2a9;
      --text-hint:  #71706a;
      --amber:      #BA7517;
      --green:      #639922;
      --red:        #E24B4A;
      --radius-lg:  14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
    }

    .page {
      max-width: 800px; /* Wider for better horizontal resolution */
      margin: 0 auto;
      padding: 1.5rem;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-hint); }
    .dot.ok { background: var(--green); box-shadow: 0 0 8px var(--green); }
    .dot.fail { background: var(--red); box-shadow: 0 0 8px var(--red); }
    .dot.loading { background: var(--amber); animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 2rem;
    }

    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      text-align: center;
    }

    .m-label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.05em; }
    .m-value { font-family: 'DM Mono', monospace; font-size: 28px; font-weight: 500; margin: 4px 0; }
    .m-unit  { font-size: 12px; color: var(--text-hint); }

    .chart-container {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 1.5rem;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
    }

    .chart-wrap { position: relative; width: 100%; height: 280px; } /* Increased height */

    .badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 8px;
      display: inline-block;
    }
    .badge.pass { background: rgba(99, 153, 34, 0.2); color: #8bc34a; }
    .badge.fail { background: rgba(226, 75, 74, 0.2); color: #ff5252; }

    @media (max-width: 600px) {
      .metrics { grid-template-columns: 1fr; }
      .chart-wrap { height: 200px; }
    }
  </style>
</head>
<body>

<div class="page">
  <div class="header">
    <div style="font-size: 20px; font-weight: 600;">Mobile Hive Monitor</div>
  </div>

  <div class="status-bar">
    <div id="status-dot" class="dot loading"></div>
    <span id="status-text" style="font-family: 'DM Mono';">Syncing with ThingSpeak...</span>
    <span id="last-check" style="margin-left: auto; color: var(--text-hint);">—</span>
  </div>

  <div class="metrics">
    <div class="metric-card">
      <div class="m-label">CO2</div>
      <div class="m-value" id="v-co2">—</div>
      <div class="m-unit">ppm</div>
      <div id="b-co2" class="badge">Waiting</div>
    </div>
    <div class="metric-card">
      <div class="m-label">Temperature</div>
      <div class="m-value" id="v-temp">—</div>
      <div class="m-unit">°F</div>
      <div id="b-temp" class="badge">Waiting</div>
    </div>
    <div class="metric-card">
      <div class="m-label">Humidity</div>
      <div class="m-value" id="v-hum">—</div>
      <div class="m-unit">%</div>
      <div id="b-hum" class="badge">Waiting</div>
    </div>
  </div>

  <div class="chart-container">
    <div class="chart-header"><span>CO2 Levels</span><span id="co2-stats">—</span></div>
    <div class="chart-wrap"><canvas id="c-co2"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header"><span>Internal Temp</span><span id="temp-stats">—</span></div>
    <div class="chart-wrap"><canvas id="c-temp"></canvas></div>
  </div>

  <div class="chart-container">
    <div class="chart-header"><span>Humidity</span><span id="hum-stats">—</span></div>
    <div class="chart-wrap"><canvas id="c-hum"></canvas></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
  const CHANNEL = '3329131';
  const LIMIT   = 720; 
  const OFFLINE_THRESHOLD = 20 * 60 * 1000; // 20 mins

  const RANGE = {
    co2:  { min: 400, max: 10000 },
    temp: { min: 70,  max: 97 },
    hum:  { min: 50,  max: 60 }
  };

  // Helper for clear time labels
  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }

  function makeChart(ctxId, color) {
    const ctx = document.getElementById(ctxId).getContext('2d');
    return new Chart(ctx, {
      type: 'line',
      data: { labels: [], datasets: [{ 
        data: [], 
        borderColor: color, 
        borderWidth: 2, 
        pointRadius: 0,
        pointHitRadius: 20,
        tension: 0.3, // Smooth but not "floaty"
        fill: true,
        backgroundColor: color + '15',
        spanGaps: false // CRITICAL: Shows gaps when device is off
      }]},
      options: {
        responsive: true,
        maintainAspectRatio: false,
        parsing: false, // Performance boost for 700+ points
        normalized: true,
        plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#71706a', font: { size: 10 }, maxTicksLimit: 6 } },
          y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#71706a', font: { size: 10 } } }
        }
      }
    });
  }

  const charts = {
    co2:  makeChart('c-co2', '#BA7517'),
    temp: makeChart('c-temp', '#639922'),
    hum:  makeChart('c-hum', '#185FA5')
  };

  function updateUI(id, val, range) {
    const el = document.getElementById('v-' + id);
    const bg = document.getElementById('b-' + id);
    if (isNaN(val)) return;

    el.textContent = (id === 'co2') ? Math.round(val) : val.toFixed(1);
    const isOk = val >= range.min && val <= range.max;
    bg.textContent = isOk ? 'NORMAL' : 'OUT OF RANGE';
    bg.className = 'badge ' + (isOk ? 'pass' : 'fail');
    return isOk;
  }

  async function sync() {
    const dot = document.getElementById('status-dot');
    const txt = document.getElementById('status-text');
    
    try {
      const response = await fetch(`https://api.thingspeak.com/channels/${CHANNEL}/feeds.json?results=${LIMIT}`);
      const data = await response.json();
      const feeds = data.feeds;

      if (!feeds.length) return;

      const lastReading = feeds[feeds.length - 1];
      const isStale = (Date.now() - new Date(lastReading.created_at).getTime()) > OFFLINE_THRESHOLD;

      // Update Top Status
      dot.className = isStale ? 'dot' : 'dot ok';
      txt.textContent = isStale ? 'Monitor Offline (Showing History)' : 'Monitor Active';
      document.getElementById('last-check').textContent = 'Last: ' + formatTime(lastReading.created_at);

      // Process Metrics
      const cPass = updateUI('co2',  parseFloat(lastReading.field1), RANGE.co2);
      const tPass = updateUI('temp', parseFloat(lastReading.field2), RANGE.temp);
      const hPass = updateUI('hum',  parseFloat(lastReading.field3), RANGE.hum);

      // Refresh Charts
      const labels = feeds.map(f => f.created_at);
      
      const updateChartData = (chart, field, key) => {
        const values = feeds.map(f => {
            const v = parseFloat(f[field]);
            return isNaN(v) ? null : v;
        });
        chart.data.labels = labels.map(l => formatTime(l));
        chart.data.datasets[0].data = values;
        
        // Intelligent Y-Axis Scaling
        const valid = values.filter(v => v !== null);
        const min = Math.min(...valid);
        const max = Math.max(...valid);
        const pad = (max - min) * 0.2 || 2;
        chart.options.scales.y.min = Math.floor(min - pad);
        chart.options.scales.y.max = Math.ceil(max + pad);
        
        chart.update('none');
      };

      updateChartData(charts.co2,  'field1');
      updateChartData(charts.temp, 'field2');
      updateChartData(charts.hum,  'field3');

    } catch (err) {
      txt.textContent = 'Connection Error';
      dot.className = 'dot fail';
    }
  }

  sync();
  setInterval(sync, 300000); // Sync every 5 mins
</script>

</body>
</html>
